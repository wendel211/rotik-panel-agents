services:
  - type: web
    name: rotik-agents-api-wendel211
    runtime: docker
    plan: free
    region: virginia
    branch: main
    autoDeployTrigger: checksPass
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    buildFilter:
      paths:
        - backend/**
        - db/**
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rotik-agents-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CORS_ORIGIN
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: ALLOW_DEMO_SEED
        value: "true"

databases:
  - name: rotik-agents-db
    plan: free
    region: virginia
    databaseName: rotik
    user: rotik_app
    ipAllowList: []

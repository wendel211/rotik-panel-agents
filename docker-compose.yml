services:
  db:
    image: postgres:16-alpine
    container_name: rotik-db
    restart: unless-stopped
    environment:
      # Sem fallback para credenciais: o Compose falha cedo se a raiz não tiver
      # um .env criado a partir de .env.example. Assim nenhum segredo de runtime
      # fica gravado no manifesto.
      POSTGRES_USER: ${POSTGRES_USER:?Defina POSTGRES_USER no .env da raiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env da raiz}
      POSTGRES_DB: ${POSTGRES_DB:?Defina POSTGRES_DB no .env da raiz}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Os scripts em init/ rodam em ordem alfabética, uma única vez, quando o
      # volume de dados está vazio. Para reexecutá-los: `docker compose down -v`.
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - rotik_pgdata:/var/lib/postgresql/data
    healthcheck:
      # Sem isso, o backend sobe antes do banco aceitar conexões e morre no boot.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  rotik_pgdata:
